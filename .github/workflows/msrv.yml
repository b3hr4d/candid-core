name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  msrv:
    name: Rust 1.78
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.78.0
      - name: Test the locked dependency graph
        run: cargo test --all-targets --locked
  stable:
    name: Stable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --all-targets --locked
  features:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Every supported combination, so a change that only compiles with
      # defaults fails here rather than in a downstream `default-features =
      # false` consumer. Suites that need a feature throughout declare
      # `required-features` and are skipped; suites with pure-model coverage
      # gate individual cases and still run with no features at all.
      - name: Test every feature combination
        run: |
          set -euxo pipefail
          cargo test --all-targets --locked --no-default-features
          cargo test --all-targets --locked --no-default-features --features host-value
          cargo test --all-targets --locked --no-default-features --features compiler
          cargo test --all-targets --locked --no-default-features --features compiler,host-value
          cargo test --all-targets --locked --no-default-features --features filesystem-compiler
          cargo test --all-targets --locked --all-features
      - name: Lint every feature combination
        run: |
          set -euxo pipefail
          cargo clippy --all-targets --locked --no-default-features -- -D warnings
          cargo clippy --all-targets --locked --no-default-features --features host-value -- -D warnings
          cargo clippy --all-targets --locked --no-default-features --features compiler -- -D warnings
          cargo clippy --all-targets --locked --no-default-features --features filesystem-compiler -- -D warnings
      # Doctests and rustdoc are feature-sensitive too: an intra-doc link to an
      # item that only exists behind a feature must not break the reduced build.
      - name: Documentation for the reduced and full surfaces
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          set -euxo pipefail
          cargo test --doc --locked --no-default-features
          cargo test --doc --locked --all-features
          cargo doc --no-deps --locked --no-default-features
          cargo doc --no-deps --locked --all-features
  dependency-boundaries:
    name: Feature dependency boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # Resolves `cargo metadata` per feature set and target and asserts what
      # each one may and may not contain. This is the evidence behind the
      # feature split: without it, "the base has no Candid engine" is a claim
      # about source files rather than about what a consumer builds.
      - name: Verify what each feature set puts in a consumer's graph
        run: python3 tests/fixtures/packaging/verify_feature_graph.py
  conformance-reference:
    name: Independent conformance reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # A standard-library Python canonicalizer recomputes every manifest
      # vector's canonical graph, payload bytes, preimage, and IDs from the
      # raw noncanonical inputs, entirely outside the Rust implementation.
      # Kept as its own job: the Rust suites do not run Python transitively,
      # and a Python subprocess inside cross-platform Rust tests would be
      # brittle.
      - name: Reproduce every conformance vector without Rust
        run: python3 tests/fixtures/conformance/verify_vectors.py
  wasm:
    name: Stable WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # A build check, not a runtime claim. The default build still succeeds
      # here because `cap-std` is declared under `cfg(not(target_os =
      # "unknown"))` as well as behind `filesystem-compiler`.
      - name: Check WASM library across feature sets
        run: |
          set -euxo pipefail
          cargo check --lib --target wasm32-unknown-unknown --locked --no-default-features
          cargo check --lib --target wasm32-unknown-unknown --locked --no-default-features --features host-value
          cargo check --lib --target wasm32-unknown-unknown --locked --no-default-features --features compiler
          cargo check --lib --target wasm32-unknown-unknown --locked
  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile and exercise every benchmark once
        run: cargo bench --benches --locked -- --test
  benchmarks:
    name: Scheduled benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Record environment
        run: |
          mkdir -p benchmark-artifacts
          rustc --version --verbose > benchmark-artifacts/environment.txt
          cargo --version >> benchmark-artifacts/environment.txt
          uname -a >> benchmark-artifacts/environment.txt
          echo "git_sha=${GITHUB_SHA}" >> benchmark-artifacts/environment.txt
      - name: Run statistical benchmarks
        run: cargo bench --bench compilation --locked -- --noplot
      - name: Run allocation probe
        run: cargo bench --bench allocation --locked > benchmark-artifacts/allocations.json
      - name: Collect machine-readable Criterion results
        run: cp -R target/criterion benchmark-artifacts/criterion
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.sha }}
          path: benchmark-artifacts
          retention-days: 90
  fuzz-replay:
    name: Fuzz targets build and replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      # `cargo fuzz` has no --locked passthrough, so enforce the tracked
      # lockfile separately. Fails if fuzz/Cargo.lock is stale or incomplete.
      - name: Verify the fuzz lockfile is current
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 > /dev/null
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      # Compiling every target on each pull request is the point of this job:
      # a target that stops compiling, or is renamed without updating
      # `fuzz/Cargo.toml`, otherwise stays invisible until the next schedule.
      - name: Build every fuzz target
        run: cargo +nightly fuzz build --dev
      # `-runs=0` replays the tracked corpora without mutating, so this is
      # deterministic: it fails only if a seed or a previously fixed crash
      # reproduces. No new inputs are generated, so it cannot flake.
      - name: Replay seeds and regressions
        run: |
          for target in $(cargo +nightly fuzz list); do
            mkdir -p "fuzz/corpus/${target}" "fuzz/seeds/${target}" "fuzz/regressions/${target}"
            echo "::group::replay ${target}"
            cargo +nightly fuzz run --dev "${target}" \
              "fuzz/corpus/${target}" "fuzz/seeds/${target}" "fuzz/regressions/${target}" \
              -- -runs=0
            echo "::endgroup::"
          done
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-replay-artifacts-${{ github.sha }}
          path: fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 30
  fuzz:
    name: Scheduled fuzzing
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      # `cargo fuzz` has no --locked passthrough, so enforce the tracked
      # lockfile separately. Fails if fuzz/Cargo.lock is stale or incomplete.
      - name: Verify the fuzz lockfile is current
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 > /dev/null
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      # Seeds and regressions are passed as additional read-only corpora.
      # libFuzzer writes only to the first directory, which is gitignored, so a
      # run never mutates tracked inputs. Seeding matters: starting cold, these
      # targets spend their budget in the JSON syntax-error path.
      - name: Fuzz trust boundaries
        run: |
          for target in $(cargo +nightly fuzz list); do
            mkdir -p "fuzz/corpus/${target}" "fuzz/seeds/${target}" "fuzz/regressions/${target}"
            echo "::group::fuzz ${target}"
            cargo +nightly fuzz run "${target}" \
              "fuzz/corpus/${target}" "fuzz/seeds/${target}" "fuzz/regressions/${target}" \
              -- -max_total_time=60
            echo "::endgroup::"
          done
      # Without this the reproducer dies with the runner and a red schedule is
      # not actionable. Runs on failure and on success, because libFuzzer also
      # writes slow-unit and oom artifacts on otherwise-passing runs.
      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ github.sha }}
          path: fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 90

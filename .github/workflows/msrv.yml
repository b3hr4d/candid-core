name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  msrv:
    name: Rust 1.78
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - name: Test the locked dependency graph
        run: cargo test --all-targets --locked
  stable:
    name: Stable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --all-targets --locked
  wasm:
    name: Stable WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Check WASM library
        run: cargo check --lib --target wasm32-unknown-unknown --locked
  fuzz:
    name: Scheduled fuzzing
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      - name: Fuzz trust boundaries
        run: |
          cargo +nightly fuzz run source_parsing -- -max_total_time=60
          cargo +nightly fuzz run contract_json -- -max_total_time=60
          cargo +nightly fuzz run canonicalization -- -max_total_time=60
          cargo +nightly fuzz run resolver_ids -- -max_total_time=60
          cargo +nightly fuzz run provenance -- -max_total_time=60
          cargo +nightly fuzz run host_value -- -max_total_time=60
